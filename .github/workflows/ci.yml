name: ci

# Runs on every PR + main pushes. Triggers the whole .NET pipeline:
# restore → build (warnings = errors) → unit + integration + architecture tests
# with coverage. Integration tests rely on Testcontainers, which talks to the
# host Docker daemon — `ubuntu-latest` ships with it preinstalled.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build + test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['9.0.x']
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      # Testcontainers honors these to discover the Docker socket and behave
      # well in ephemeral CI runners.
      TESTCONTAINERS_RYUK_DISABLED: 'false'
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore cashflow.sln

      - name: Build (Release, warnings as errors)
        # Directory.Build.props sets TreatWarningsAsErrors=true in Release, so this
        # step catches any analyzer / nullability / xUnit warning that snuck in.
        run: dotnet build cashflow.sln -c Release --no-restore

      - name: Unit + Architecture tests
        # We run unit and architecture tests separately from integration tests
        # because they are fast and provide quick signal if a structural rule
        # is broken — saving the long Testcontainers wait.
        run: |
          dotnet test tests/Cashflow.SharedKernel.UnitTests/Cashflow.SharedKernel.UnitTests.csproj -c Release --no-build --logger trx
          dotnet test tests/Cashflow.Ledger.UnitTests/Cashflow.Ledger.UnitTests.csproj -c Release --no-build --logger trx
          dotnet test tests/Cashflow.ArchitectureTests/Cashflow.ArchitectureTests.csproj -c Release --no-build --logger trx

      - name: Integration tests (Testcontainers)
        # Pulls Postgres / Mongo / Rabbit / Redis images on demand and spins up
        # ephemeral containers per fixture. Allow extra time for first-run image pulls.
        run: |
          dotnet test tests/Cashflow.Ledger.IntegrationTests/Cashflow.Ledger.IntegrationTests.csproj \
            -c Release --no-build --logger trx -- xunit.parallelizeAssembly=false
          dotnet test tests/Cashflow.Consolidation.IntegrationTests/Cashflow.Consolidation.IntegrationTests.csproj \
            -c Release --no-build --logger trx -- xunit.parallelizeAssembly=false

      - name: Coverage (Domain + Application gates)
        # Coverlet's XPlat collector emits Cobertura per project; we run only the
        # unit-test projects here to keep coverage focused on the layers we gate on
        # (Domain ≥ 90%, Application ≥ 80% — see `08-TESTES.md §7`).
        run: |
          dotnet test tests/Cashflow.Ledger.UnitTests/Cashflow.Ledger.UnitTests.csproj \
            -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Coverage
          dotnet test tests/Cashflow.SharedKernel.UnitTests/Cashflow.SharedKernel.UnitTests.csproj \
            -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Coverage

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:./TestResults/Coverage/**/coverage.cobertura.xml \
            -targetdir:./TestResults/CoverageReport \
            -reporttypes:'Html;Cobertura;TextSummary'
          cat ./TestResults/CoverageReport/Summary.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./TestResults/CoverageReport
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7
