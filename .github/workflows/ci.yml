name: CI

# Pipeline conforme `07-INFRA-E-DEVOPS.md §5.1`:
#   build-test  → restore + build + unit + arch + coverage gates (Domain ≥90 / App ≥80)
#   integration → Testcontainers (Postgres / Mongo / Rabbit / Redis)
#   k6-smoke    → compose up core+app, roda perf/k6/balance-smoke.js
#   build-push  → bake 4 imagens p/ GHCR (sha + latest) + Trivy HIGH/CRITICAL = 0
#
# Apenas o build-push gera publicações; ele depende de todos os anteriores e
# só roda em pushes para `main`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOCKER_BUILDKIT: '1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (Domain ≥90% / Application ≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore cashflow.sln

      - name: Build (Release, warnings as errors)
        run: dotnet build cashflow.sln -c Release --no-restore

      - name: Unit + Architecture tests
        run: |
          dotnet test tests/Cashflow.SharedKernel.UnitTests/Cashflow.SharedKernel.UnitTests.csproj -c Release --no-build --logger trx
          dotnet test tests/Cashflow.Ledger.UnitTests/Cashflow.Ledger.UnitTests.csproj         -c Release --no-build --logger trx
          dotnet test tests/Cashflow.ArchitectureTests/Cashflow.ArchitectureTests.csproj       -c Release --no-build --logger trx

      - name: Coverage collection
        # Coverlet's XPlat collector emits Cobertura per project. We only collect on
        # unit-test projects — Domain + Application coverage is what the gate checks.
        run: |
          dotnet test tests/Cashflow.Ledger.UnitTests/Cashflow.Ledger.UnitTests.csproj \
            -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Coverage
          dotnet test tests/Cashflow.SharedKernel.UnitTests/Cashflow.SharedKernel.UnitTests.csproj \
            -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults/Coverage

      - name: Generate coverage report + threshold gate
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:./TestResults/Coverage/**/coverage.cobertura.xml \
            -targetdir:./TestResults/CoverageReport \
            -reporttypes:'Html;Cobertura;TextSummary' \
            -assemblyfilters:'+Cashflow.*.Domain;+Cashflow.*.Application' \
            -classfilters:'-*Tests*'
          cat ./TestResults/CoverageReport/Summary.txt
          # ReportGenerator's TextSummary lists each assembly as a single line whose
          # last column is the line coverage percentage, e.g.
          #     Cashflow.Ledger.Application                                                91%
          # We take the MIN across every Cashflow.*.Domain / Cashflow.*.Application row
          # so the gate scales naturally to additional bounded contexts.
          DOMAIN_MIN=$(awk '
            /^Cashflow\.[A-Za-z0-9_]+\.Domain[[:space:]]+[0-9.]+%[[:space:]]*$/ {
              n=$NF; sub("%","",n);
              if (min=="" || n+0 < min+0) min=n
            } END { print (min==""?"0":min) }
          ' ./TestResults/CoverageReport/Summary.txt)
          APP_MIN=$(awk '
            /^Cashflow\.[A-Za-z0-9_]+\.Application[[:space:]]+[0-9.]+%[[:space:]]*$/ {
              n=$NF; sub("%","",n);
              if (min=="" || n+0 < min+0) min=n
            } END { print (min==""?"0":min) }
          ' ./TestResults/CoverageReport/Summary.txt)
          echo "Domain (min) coverage: ${DOMAIN_MIN}% | Application (min) coverage: ${APP_MIN}%"
          awk -v d="$DOMAIN_MIN" 'BEGIN{exit !(d+0 >= 90)}' || { echo "::error::Domain coverage ${DOMAIN_MIN}% < 90% (08-TESTES §7)"; exit 1; }
          awk -v a="$APP_MIN"    'BEGIN{exit !(a+0 >= 80)}' || { echo "::error::Application coverage ${APP_MIN}% < 80% (08-TESTES §7)"; exit 1; }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./TestResults/CoverageReport
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  integration-tests:
    name: integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore + Build
        run: |
          dotnet restore cashflow.sln
          dotnet build cashflow.sln -c Release --no-restore

      - name: Ledger integration tests
        run: |
          dotnet test tests/Cashflow.Ledger.IntegrationTests/Cashflow.Ledger.IntegrationTests.csproj \
            -c Release --no-build --logger trx -- xunit.parallelizeAssembly=false

      - name: Consolidation integration tests
        run: |
          dotnet test tests/Cashflow.Consolidation.IntegrationTests/Cashflow.Consolidation.IntegrationTests.csproj \
            -c Release --no-build --logger trx -- xunit.parallelizeAssembly=false

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  k6-smoke:
    name: k6 smoke (perf/k6/balance-smoke.js)
    runs-on: ubuntu-latest
    needs: [build-test]
    # Full stack build + start can take a while on a cold runner; allow 30 min.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Seed .env
        # docker-compose substitutes ${VAR} from a sibling .env. The repo only
        # ships .env.example — copy it so non-secret values resolve in CI.
        run: cp infra/.env.example infra/.env

      - name: Compose up (core + app, with --wait)
        # `--wait` blocks until every service's healthcheck reports healthy or the
        # timeout elapses. Building 4 .NET images cold + Keycloak realm import is
        # the slow path; we give the wait phase 10 min after builds complete.
        run: |
          docker compose -f infra/docker-compose.yml --profile core --profile app \
            up -d --build --wait --wait-timeout 600
          docker compose -f infra/docker-compose.yml ps

      - name: Acquire merchant JWT (password grant)
        # Realm `cashflow` ships seeded users (07-INFRA §3.1.2). We exchange
        # merchant1@cashflow.local credentials for an access token and capture
        # the merchantId attribute from the JWT to feed k6. cashflow-api is the
        # confidential client; `directAccessGrantsEnabled=true` enables this flow.
        id: token
        run: |
          set -uo pipefail
          # 1) Wait until the realm endpoint responds — Keycloak 25 returns the
          #    .well-known doc *after* the realm import finishes, so this is the
          #    real readiness signal (the container's HTTP healthcheck flips much
          #    earlier).
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/realms/cashflow/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "keycloak realm reachable on attempt $i"
              break
            fi
            sleep 5
          done
          # 2) Hit the token endpoint without `-f` so we can inspect the body
          #    regardless of status. We retry a few times because users get
          #    materialised after the realm doc is queryable.
          ACCESS=""
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -sS -o /tmp/token.json -w '%{http_code}' \
              -X POST http://localhost:8080/realms/cashflow/protocol/openid-connect/token \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "client_id=cashflow-api" \
              -d "client_secret=cashflow-api-secret" \
              -d "grant_type=password" \
              -d "username=merchant1@cashflow.local" \
              -d "password=merchant123" || echo "000")
            RESPONSE=$(cat /tmp/token.json 2>/dev/null || echo "{}")
            if [ "$HTTP_CODE" = "200" ]; then
              ACCESS=$(echo "$RESPONSE" | jq -r '.access_token // empty')
              [ -n "$ACCESS" ] && break
            fi
            echo "attempt $i: HTTP=$HTTP_CODE body=$RESPONSE"
            sleep 5
          done
          if [ -z "$ACCESS" ]; then
            echo "::error::failed to acquire access token after retries"
            echo "--- last keycloak response ---"
            cat /tmp/token.json 2>/dev/null || true
            echo "--- keycloak container logs (tail) ---"
            docker logs --tail=200 cashflow-keycloak 2>&1 || true
            exit 1
          fi
          # JWT is three base64url-encoded segments; decode the payload to read merchantId.
          PAYLOAD=$(echo "$ACCESS" | cut -d. -f2)
          # Pad to a multiple of 4 chars so base64 -d does not complain.
          PADDED=$(printf "%s%s" "$PAYLOAD" "$(printf '%.0s=' $(seq 1 $((4 - ${#PAYLOAD} % 4))))" | tr '_-' '/+')
          MERCHANT_ID=$(echo "$PADDED" | base64 -d 2>/dev/null | jq -r '.merchantId')
          if [ -z "$MERCHANT_ID" ] || [ "$MERCHANT_ID" = "null" ]; then
            echo "::error::JWT has no merchantId claim"; exit 1
          fi
          echo "merchantId=$MERCHANT_ID"
          echo "::add-mask::$ACCESS"
          echo "token=$ACCESS"          >> "$GITHUB_OUTPUT"
          echo "merchant_id=$MERCHANT_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for gateway readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "gateway up"; exit 0
            fi
            sleep 5
          done
          echo "::error::gateway did not become healthy in 150s"
          docker compose -f infra/docker-compose.yml logs --no-color --tail=200
          exit 1

      - name: Run k6 smoke
        env:
          K6_TOKEN: ${{ steps.token.outputs.token }}
          K6_MERCHANT_ID: ${{ steps.token.outputs.merchant_id }}
        run: |
          # The k6 service mounts perf/k6 at /scripts. We pass TOKEN/MERCHANT_ID
          # through compose's --env-from-stdin-friendly form via `-e`.
          docker compose -f infra/docker-compose.yml --profile perf run --rm \
            -e BASE_URL=http://gateway:8080 \
            -e TOKEN="$K6_TOKEN" \
            -e MERCHANT_ID="$K6_MERCHANT_ID" \
            -e TARGET_DATE="$(date -u +%Y-%m-%d)" \
            k6 run /scripts/balance-smoke.js

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color --tail=300

      - name: Compose down
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v --remove-orphans

  build-push:
    name: build + push GHCR (Trivy HIGH/CRITICAL = 0)
    runs-on: ubuntu-latest
    needs: [build-test, integration-tests, k6-smoke]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    env:
      GHCR_OWNER: ${{ github.repository_owner }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake + push (4 imagens)
        # docker-bake.hcl publica ghcr.io/${owner}/cashflow-<service>:{sha-<SHA>,latest}
        uses: docker/bake-action@v5
        with:
          files: ./docker-bake.hcl
          push: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Trivy scan (ledger-api)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cashflow-ledger-api:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Trivy scan (consolidation-api)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cashflow-consolidation-api:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Trivy scan (consolidation-worker)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cashflow-consolidation-worker:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

      - name: Trivy scan (gateway)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cashflow-gateway:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
