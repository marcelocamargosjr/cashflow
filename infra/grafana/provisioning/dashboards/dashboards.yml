# =============================================================================
# Grafana dashboard provisioning — Cashflow F7.
# Carrega JSONs de /var/lib/grafana/dashboards (montado via volume no compose).
# =============================================================================

apiVersion: 1

providers:
  - name: cashflow
    orgId: 1
    folder: Cashflow
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
