# RabbitMQ broker config — mounted em /etc/rabbitmq/rabbitmq.conf.
#
# NÃO usamos `load_definitions` aqui: o `definitions.json` (versionado em §06 §1.2)
# tem `users: []`, e o RabbitMQ trata listas vazias como estado desejado completo —
# isso APAGAVA o user `cashflow` criado pelo RABBITMQ_DEFAULT_USER e quebrava as
# APIs (ACCESS_REFUSED). O `definitions.json` permanece como documentação da
# topologia esperada; DLX/DLQ são declaradas pelo MassTransit quando o
# Consolidation.Worker conecta (`BindDeadLetterQueue` em §06 §3.4).
#
# Se um dia precisar carregar definitions, popule `users` com hash do RabbitMQ
# (gerado por `rabbitmqctl hash_password ...`) ou inclua a flag aditiva.

# Métricas Prometheus expostas pelo plugin rabbitmq_prometheus em :15692/metrics.
prometheus.tcp.port = 15692
