# =============================================================================
# Prometheus — Cashflow (07 §2.4)
#
# Scrapeia o OTel Collector (que recebe métricas OTLP dos services .NET e
# expõe formato Prometheus em :8889) + RabbitMQ + Gateway.
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: cashflow-local
    env: docker

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          source: otel

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          source: rabbitmq

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:8080']
        labels:
          source: gateway

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
